version: 2
updates:
  # npm の依存パッケージ用（Reactアプリなどのフロントエンド）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

  # GitHub Actions のワークフロー用
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
